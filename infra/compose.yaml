services:
  postgres:
    image: postgres:17-alpine
    container_name: gtd-on-rails-postgres
    environment:
      POSTGRES_DB: gtd_on_rails
      POSTGRES_USER: gtd
      POSTGRES_PASSWORD: gtd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: gradle:9.4.0-jdk21
    container_name: gtd-on-rails-api
    working_dir: /workspace
    command: ["./gradlew", "bootRun"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gtd_on_rails
      SPRING_DATASOURCE_USERNAME: gtd
      SPRING_DATASOURCE_PASSWORD: gtd
    ports:
      - "8080:8080"
    volumes:
      - ../apps/api:/workspace
    depends_on:
      - postgres

volumes:
  postgres_data:
