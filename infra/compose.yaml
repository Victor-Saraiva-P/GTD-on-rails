services:
  postgres:
    image: postgres:17-alpine
    container_name: gtd-on-rails-postgres
    environment:
      POSTGRES_DB: gtd_on_rails
      POSTGRES_USER: gtd
      POSTGRES_PASSWORD: gtd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: eclipse-temurin:21-jre-alpine
    container_name: gtd-on-rails-api
    working_dir: /app
    command: ["sh", "-c", "echo 'api placeholder: no application artifact yet' && tail -f /dev/null"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gtd_on_rails
      SPRING_DATASOURCE_USERNAME: gtd
      SPRING_DATASOURCE_PASSWORD: gtd
    depends_on:
      - postgres

volumes:
  postgres_data:

