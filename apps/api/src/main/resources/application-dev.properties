spring.datasource.url=jdbc:sqlite:./${gtd.persistence.bootstrap.clone-directory}/db/gtd-on-rails.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
gtd.persistence.bootstrap.branch=dev
gtd.persistence.sync.enabled=${GTD_PERSISTENCE_SYNC_ENABLED:true}
gtd.persistence.sync.interval-ms=${GTD_PERSISTENCE_SYNC_INTERVAL_MS:300000}
gtd.persistence.sync.commit-author-name=${GTD_PERSISTENCE_SYNC_COMMIT_AUTHOR_NAME:GTD on Rails}
gtd.persistence.sync.commit-author-email=${GTD_PERSISTENCE_SYNC_COMMIT_AUTHOR_EMAIL:gtdonrails@local}
gtd.assets.local-directory=${GTD_ASSETS_LOCAL_DIRECTORY:./dev-gtd-on-rails}
gtd.assets.rclone.enabled=${GTD_ASSETS_RCLONE_ENABLED:true}
gtd.assets.rclone.command=${GTD_ASSETS_RCLONE_COMMAND:rclone}
gtd.assets.rclone.remote=${GTD_ASSETS_RCLONE_REMOTE:gdrive:dev-gtd-on-rails}
gtd.assets.sync.interval-ms=${GTD_ASSETS_SYNC_INTERVAL_MS:300000}
gtd.assets.sync.state-directory=${GTD_ASSETS_SYNC_STATE_DIRECTORY:./.gtd-assets-sync}
gtd.assets.sync.force=${GTD_ASSETS_SYNC_FORCE:true}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://127.0.0.1:1420,http://localhost:1420}
