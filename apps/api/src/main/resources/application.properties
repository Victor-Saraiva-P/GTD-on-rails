spring.application.name=api
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.web.resources.add-mappings=false
api.project-name=https://gtdonrails.local
api.base-url=/errors
gtd.persistence.bootstrap.repository-url=https://github.com/Victor-Saraiva-P/gtd-persistence.git
gtd.persistence.bootstrap.clone-directory=gtd-persistence
gtd.persistence.sync.enabled=${GTD_PERSISTENCE_SYNC_ENABLED:true}
gtd.persistence.sync.interval-ms=${GTD_PERSISTENCE_SYNC_INTERVAL_MS:300000}
gtd.persistence.sync.commit-author-name=${GTD_PERSISTENCE_SYNC_COMMIT_AUTHOR_NAME:GTD on Rails}
gtd.persistence.sync.commit-author-email=${GTD_PERSISTENCE_SYNC_COMMIT_AUTHOR_EMAIL:gtdonrails@local}
